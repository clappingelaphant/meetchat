<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MeetChat - Random Video Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #16213e;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid #0f3460;
    }

    header h1 {
      font-size: 24px;
      color: #e94560;
      letter-spacing: 1px;
    }

    header .user-count {
      font-size: 14px;
      color: #aaa;
    }

    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .video-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 8px;
      min-width: 0;
    }

    .video-container {
      flex: 1;
      position: relative;
      background: #0f0f23;
      border-radius: 12px;
      overflow: hidden;
      min-height: 0;
    }

    .video-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .video-label {
      position: absolute;
      bottom: 10px;
      left: 10px;
      background: rgba(0,0,0,0.6);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
    }

    .chat-section {
      width: 360px;
      display: flex;
      flex-direction: column;
      background: #16213e;
      border-left: 2px solid #0f3460;
    }

    .chat-header {
      padding: 12px 16px;
      background: #0f3460;
      font-weight: 600;
      font-size: 14px;
      text-align: center;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .chat-messages::-webkit-scrollbar { width: 6px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 3px; }

    .msg {
      padding: 8px 12px;
      border-radius: 12px;
      max-width: 85%;
      word-wrap: break-word;
      font-size: 14px;
      line-height: 1.4;
    }

    .msg.you {
      background: #e94560;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .msg.stranger {
      background: #0f3460;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .msg.system {
      background: none;
      color: #888;
      font-style: italic;
      align-self: center;
      text-align: center;
      font-size: 13px;
    }

    .chat-input-area {
      display: flex;
      padding: 10px;
      gap: 8px;
      border-top: 1px solid #0f3460;
    }

    .chat-input-area input {
      flex: 1;
      padding: 10px 14px;
      border: none;
      border-radius: 24px;
      background: #1a1a2e;
      color: #eee;
      font-size: 14px;
      outline: none;
    }

    .chat-input-area input::placeholder { color: #666; }

    .chat-input-area button {
      padding: 10px 18px;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 24px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
    }

    .chat-input-area button:hover { background: #c73652; }

    .controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: 12px;
      background: #16213e;
      border-top: 2px solid #0f3460;
    }

    .controls button {
      padding: 12px 28px;
      border: none;
      border-radius: 30px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, background 0.2s;
    }

    .controls button:active { transform: scale(0.95); }

    .btn-start {
      background: #27ae60;
      color: #fff;
    }
    .btn-start:hover { background: #219a52; }

    .btn-skip {
      background: #e94560;
      color: #fff;
    }
    .btn-skip:hover { background: #c73652; }

    .btn-stop {
      background: #555;
      color: #fff;
    }
    .btn-stop:hover { background: #444; }

    .btn-toggle {
      background: #0f3460;
      color: #fff;
    }
    .btn-toggle:hover { background: #1a4a8a; }

    #status-banner {
      display: none;
      text-align: center;
      padding: 10px;
      font-size: 15px;
      background: #0f3460;
      color: #ddd;
    }

    #status-banner.show { display: block; }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #888;
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 800px) {
      .main { flex-direction: column; }
      .video-section { flex-direction: row; }
      .chat-section {
        width: 100%;
        height: 250px;
        border-left: none;
        border-top: 2px solid #0f3460;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>MeetChat</h1>
    <span class="user-count" id="user-count"></span>
  </header>

  <div id="status-banner"></div>

  <div class="main">
    <div class="video-section">
      <div class="video-container">
        <video id="local-video" autoplay muted playsinline></video>
        <div class="video-label">You</div>
      </div>
      <div class="video-container">
        <video id="remote-video" autoplay playsinline></video>
        <div class="video-label">Stranger</div>
      </div>
    </div>

    <div class="chat-section">
      <div class="chat-header">Chat</div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-area">
        <input type="text" id="chat-input" placeholder="Type a message..." disabled />
        <button id="send-btn" disabled>Send</button>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn-start" id="start-btn">Start</button>
    <button class="btn-skip" id="skip-btn" style="display:none">Next (Esc)</button>
    <button class="btn-stop" id="stop-btn" style="display:none">Stop</button>
    <button class="btn-toggle" id="cam-btn">Cam Off</button>
    <button class="btn-toggle" id="mic-btn">Mic Off</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    const localVideo = document.getElementById("local-video");
    const remoteVideo = document.getElementById("remote-video");
    const chatMessages = document.getElementById("chat-messages");
    const chatInput = document.getElementById("chat-input");
    const sendBtn = document.getElementById("send-btn");
    const startBtn = document.getElementById("start-btn");
    const skipBtn = document.getElementById("skip-btn");
    const stopBtn = document.getElementById("stop-btn");
    const camBtn = document.getElementById("cam-btn");
    const micBtn = document.getElementById("mic-btn");
    const statusBanner = document.getElementById("status-banner");

    let localStream = null;
    let peerConnection = null;
    let partnerId = null;
    let camOn = true;
    let micOn = true;

    const rtcConfig = {
      iceServers: [
        { urls: "stun:stun.l.google.com:19302" },
        { urls: "stun:stun1.l.google.com:19302" }
      ]
    };

    async function getMedia() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({
          video: true,
          audio: true
        });
        localVideo.srcObject = localStream;
        return true;
      } catch (err) {
        showStatus("Camera/mic access denied. Please allow permissions and reload.");
        console.error(err);
        return false;
      }
    }

    function showStatus(text, showSpinner) {
      statusBanner.innerHTML = (showSpinner ? '<span class="spinner"></span>' : '') + text;
      statusBanner.classList.add("show");
    }

    function hideStatus() {
      statusBanner.classList.remove("show");
    }

    function addMessage(text, type) {
      const div = document.createElement("div");
      div.className = "msg " + type;
      div.textContent = text;
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function clearChat() {
      chatMessages.innerHTML = "";
    }

    function setChatEnabled(enabled) {
      chatInput.disabled = !enabled;
      sendBtn.disabled = !enabled;
    }

    function createPeer(initiator) {
      peerConnection = new RTCPeerConnection(rtcConfig);

      localStream.getTracks().forEach((track) => {
        peerConnection.addTrack(track, localStream);
      });

      peerConnection.ontrack = (event) => {
        remoteVideo.srcObject = event.streams[0];
      };

      peerConnection.onicecandidate = (event) => {
        if (event.candidate) {
          socket.emit("signal", {
            to: partnerId,
            signal: { type: "candidate", candidate: event.candidate }
          });
        }
      };

      peerConnection.onconnectionstatechange = () => {
        if (peerConnection.connectionState === "disconnected" ||
            peerConnection.connectionState === "failed") {
          handlePartnerDisconnect();
        }
      };

      if (initiator) {
        peerConnection.createOffer()
          .then((offer) => peerConnection.setLocalDescription(offer))
          .then(() => {
            socket.emit("signal", {
              to: partnerId,
              signal: { type: "offer", sdp: peerConnection.localDescription }
            });
          });
      }
    }

    function closePeer() {
      if (peerConnection) {
        peerConnection.close();
        peerConnection = null;
      }
      remoteVideo.srcObject = null;
      partnerId = null;
    }

    function handlePartnerDisconnect() {
      closePeer();
      setChatEnabled(false);
      addMessage("Stranger has disconnected.", "system");
      skipBtn.style.display = "none";
      stopBtn.style.display = "none";
      startBtn.style.display = "";
      hideStatus();
    }

    // --- Socket events ---

    socket.on("waiting", () => {
      showStatus("Looking for someone to chat with...", true);
    });

    socket.on("matched", async ({ partnerId: pid, initiator }) => {
      partnerId = pid;
      hideStatus();
      clearChat();
      addMessage("You're now chatting with a stranger. Say hi!", "system");
      setChatEnabled(true);
      startBtn.style.display = "none";
      skipBtn.style.display = "";
      stopBtn.style.display = "";
      createPeer(initiator);
    });

    socket.on("signal", async ({ from, signal }) => {
      if (!peerConnection) return;

      if (signal.type === "offer") {
        await peerConnection.setRemoteDescription(new RTCSessionDescription(signal.sdp));
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);
        socket.emit("signal", {
          to: from,
          signal: { type: "answer", sdp: peerConnection.localDescription }
        });
      } else if (signal.type === "answer") {
        await peerConnection.setRemoteDescription(new RTCSessionDescription(signal.sdp));
      } else if (signal.type === "candidate") {
        await peerConnection.addIceCandidate(new RTCIceCandidate(signal.candidate));
      }
    });

    socket.on("chat-message", (msg) => {
      addMessage(msg, "stranger");
    });

    socket.on("partner-disconnected", () => {
      handlePartnerDisconnect();
    });

    // --- UI events ---

    startBtn.addEventListener("click", async () => {
      if (!localStream) {
        const ok = await getMedia();
        if (!ok) return;
      }
      closePeer();
      clearChat();
      socket.emit("find-partner");
    });

    skipBtn.addEventListener("click", () => {
      socket.emit("skip");
      closePeer();
      clearChat();
      addMessage("You skipped. Finding a new stranger...", "system");
      socket.emit("find-partner");
    });

    stopBtn.addEventListener("click", () => {
      socket.emit("skip");
      closePeer();
      clearChat();
      setChatEnabled(false);
      hideStatus();
      skipBtn.style.display = "none";
      stopBtn.style.display = "none";
      startBtn.style.display = "";
      addMessage("You disconnected.", "system");
    });

    function sendMessage() {
      const text = chatInput.value.trim();
      if (!text) return;
      socket.emit("chat-message", text);
      addMessage(text, "you");
      chatInput.value = "";
    }

    sendBtn.addEventListener("click", sendMessage);
    chatInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && partnerId) {
        skipBtn.click();
      }
    });

    camBtn.addEventListener("click", () => {
      if (!localStream) return;
      camOn = !camOn;
      localStream.getVideoTracks().forEach((t) => (t.enabled = camOn));
      camBtn.textContent = camOn ? "Cam Off" : "Cam On";
    });

    micBtn.addEventListener("click", () => {
      if (!localStream) return;
      micOn = !micOn;
      localStream.getAudioTracks().forEach((t) => (t.enabled = micOn));
      micBtn.textContent = micOn ? "Mic Off" : "Mic On";
    });
  </script>
</body>
</html>
